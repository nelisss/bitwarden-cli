name: Build and push docker image
run-name: Build docker image and push to self-hosted registry
on:
  push:
    branches:
      - "**"
  tags:
    - "v*.*.*"
  pull_request:

jobs:
  docker:
    runs-on: services1
    env:
      TEST_TAG: bitwarden-api:test
    steps:
      - name: Build image for testing
        uses: docker/build-push-action@v7
        with:
          load: true
          tags: ${{ env.TEST_TAG }}

      - name: Test new image - Bitwarden with custom uid, gid and port
        run: |
          docker run --rm -e BW_CLIENTID=${{ secrets.BITWARDEN_API_USERNAME }} \
          -e BW_CLIENTSECRET=${{ secrets.BITWARDEN_API_PASSWORD}} \
          -e BW_UID=1234 -e BW_GID=1234 -e BW_PORT=1234
          ${{ env.TEST_TAG }}

      - name: Test new image - self-hosted Vaultwarden
        run: |
          docker run --rm -e BW_CLIENTID=${{ secrets.VAULTWARDEN_API_USERNAME }} \
          -e BW_CLIENTSECRET=${{ secrets.VAULTWARDEN_API_PASSWORD}} \
          -e BW_SERVER=${{ vars.VAULTWARDEN_ADDRESS }}
          ${{ env.TEST_TAG }}

      - name: Set up image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            nelisss/bitwarden-cli
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Log in to registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.DOCKER_REGISTRY_ADDRESS }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build image for testing
        uses: docker/build-push-action@v7
        with:
          push: true
